spring:
  autoconfigure:
    exclude: []
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

llm:
  provider: ${LLM_PROVIDER}
  api-key: ${LLM_API_KEY}

logging:
  level:
    root: WARN
    com.achul.compliance: INFO
