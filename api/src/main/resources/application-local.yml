spring:
  # local н”„лЎњнЊЊмќјм—ђм„њлЉ” DB/JPA/Flyway autoconfigureлҐј л‹¤м‹њ мј л‹¤.
  autoconfigure:
    exclude: []
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:compliance_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

llm:
  provider: ${LLM_PROVIDER:openai}
  api-key: ${LLM_API_KEY:}
