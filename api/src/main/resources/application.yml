spring:
  application:
    name: ai-compliance-guard
  # Phase 0 기본 프로파일에서는 DB 없이도 기동 가능하도록
  # DataSource/JPA/Flyway autoconfigure를 제외한다.
  # 로컬 통합 테스트 시 SPRING_PROFILES_ACTIVE=local 로 활성화한다.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  version: 0.1.0-SNAPSHOT

# P1-5: Upstage API 설정
upstage:
  api-key: ${UPSTAGE_API_KEY:placeholder_key}
  embedding-model: ${UPSTAGE_EMBEDDING_MODEL:solar-embedding-1-large}
  api-url: ${UPSTAGE_API_URL:https://api.upstage.ai/v1/embeddings}
  embedding-dimension: ${UPSTAGE_EMBEDDING_DIMENSION:4096}
  timeout-seconds: ${UPSTAGE_TIMEOUT_SECONDS:30}
  batch-size: ${UPSTAGE_BATCH_SIZE:20}
  max-retries: ${UPSTAGE_MAX_RETRIES:3}
  # D4: Upstage Solar-reranker
  reranker-model: ${UPSTAGE_RERANKER_MODEL:solar-1-reranker}
  reranker-url: ${UPSTAGE_RERANKER_URL:https://api.upstage.ai/v1/ranking}

logging:
  level:
    root: INFO
    com.achul.compliance: DEBUG
