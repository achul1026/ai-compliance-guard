services:
  postgres:
    # ADR-002: ParadeDBлҠ” pg_search(BM25) + pgvector лҸҷлҙү (Phase 1)
    # PG16 м•Ҳм • нғңк·ё кі м • (ADR-002 к¶Ңкі : л©”мқҙм Җ.л§Ҳмқҙл„Ҳ н•Җ)
    image: paradedb/paradedb:0.23.5-pg16
    container_name: compliance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-compliance_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-compliance_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
